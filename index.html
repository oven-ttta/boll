<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เกมแต่งตัวตุ๊กตา 🎀</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(160deg, #ffd9e8 0%, #ffeaf3 45%, #d9ecff 100%);
    }
    #game {
      width: 100%;
      height: 100%;
    }
    #game canvas {
      border-radius: 6px;
      box-shadow: 0 10px 40px rgba(214, 105, 150, 0.25);
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <!-- กล่องแสดงข้อผิดพลาด (ช่วยตอนพัฒนา) -->
  <script>
    window.addEventListener('error', function (e) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;left:8px;bottom:8px;max-width:90%;' +
        'background:#c0392b;color:#fff;padding:8px 12px;font:13px monospace;' +
        'z-index:9999;border-radius:8px;white-space:pre-wrap;';
      d.textContent = 'ERROR: ' + e.message + ' @ ' + (e.filename || '') + ':' + (e.lineno || '');
      document.body.appendChild(d);
    });
  </script>

  <script src="lib/phaser.min.js"></script>
  <script src="src/data.js"></script>
  <script src="src/art.js"></script>
  <script src="src/scenes.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
